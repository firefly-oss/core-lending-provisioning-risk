components:
  schemas:
    ProvisioningCaseDTO:
      required:
      - loanServicingCaseId
      - provisioningStatus
      - riskGrade
      - stageCode
      type: object
      properties:
        provisioningCaseId:
          type: string
          format: uuid
          readOnly: true
        loanServicingCaseId:
          type: string
          format: uuid
        stageCode:
          type: string
          enum:
          - STAGE_1
          - STAGE_2
          - STAGE_3
          - POCI
        eclAmount:
          type: number
        riskGrade:
          type: string
          enum:
          - AAA
          - AA
          - A
          - BBB
          - BB
          - B
          - CCC
          - CC
          - C
          - D
        lastCalculatedAt:
          type: string
          format: date-time
        provisioningStatus:
          type: string
          enum:
          - ACTIVE
          - RELEASED
          - WRITTEN_OFF
          - RECOVERED
        remarks:
          maxLength: 1000
          minLength: 0
          type: string
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
    ProvisioningStageHistoryDTO:
      required:
      - changedAt
      - changedBy
      - eclAmountAtChange
      - newStageCode
      - oldStageCode
      - provisioningCaseId
      - reason
      type: object
      properties:
        provisioningStageHistoryId:
          type: string
          format: uuid
          readOnly: true
        provisioningCaseId:
          type: string
          format: uuid
        oldStageCode:
          type: string
          enum:
          - STAGE_1
          - STAGE_2
          - STAGE_3
          - POCI
        newStageCode:
          type: string
          enum:
          - STAGE_1
          - STAGE_2
          - STAGE_3
          - POCI
        eclAmountAtChange:
          type: number
        changedAt:
          type: string
          format: date-time
        changedBy:
          maxLength: 100
          minLength: 0
          type: string
        reason:
          maxLength: 500
          minLength: 0
          type: string
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
    RiskAssessmentDTO:
      required:
      - assessmentDate
      - eadValue
      - lgdValue
      - modelVersion
      - pdValue
      - provisioningCaseId
      - scenarioCode
      type: object
      properties:
        riskAssessmentId:
          type: string
          format: uuid
          readOnly: true
        provisioningCaseId:
          type: string
          format: uuid
        pdValue:
          maximum: 1.0
          exclusiveMaximum: false
          minimum: 0.0
          exclusiveMinimum: false
          type: number
        lgdValue:
          maximum: 1.0
          exclusiveMaximum: false
          minimum: 0.0
          exclusiveMinimum: false
          type: number
        eadValue:
          type: number
        modelVersion:
          maxLength: 100
          minLength: 0
          type: string
        scenarioCode:
          type: string
          enum:
          - BASE
          - OPTIMISTIC
          - ADVERSE
          - SEVERE
        assessmentDate:
          type: string
          format: date-time
        details:
          maxLength: 2000
          minLength: 0
          type: string
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
    ProvisioningCalculationDTO:
      required:
      - calcMethod
      - calcTimestamp
      - finalEcl
      - provisioningCaseId
      - riskAssessmentId
      type: object
      properties:
        provisioningCalculationId:
          type: string
          format: uuid
          readOnly: true
        provisioningCaseId:
          type: string
          format: uuid
        riskAssessmentId:
          type: string
          format: uuid
        finalEcl:
          type: number
        calcMethod:
